<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="data:," />
    <title>Rust Terminal — tmux 侧边栏设计原型</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090c10;
        --panel: #10151c;
        --panel-2: #151b24;
        --panel-3: #1b2430;
        --border: #263140;
        --border-soft: #1d2631;
        --text: #edf3f8;
        --muted: #8c9aaa;
        --faint: #596777;
        --green: #55d98a;
        --green-soft: rgba(85, 217, 138, 0.13);
        --blue: #6da8ff;
        --blue-soft: rgba(109, 168, 255, 0.14);
        --amber: #f5bd63;
        --red: #ff707d;
        --purple: #b69cff;
        --sidebar-width: 292px;
        --topbar-height: 54px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .app {
        display: flex;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 72% 10%, rgba(109, 168, 255, 0.055), transparent 25%),
          var(--bg);
      }

      .sidebar {
        position: relative;
        z-index: 30;
        display: flex;
        flex: 0 0 var(--sidebar-width);
        flex-direction: column;
        width: var(--sidebar-width);
        min-width: 0;
        border-right: 1px solid var(--border);
        background: rgba(15, 20, 27, 0.98);
        transition: width 180ms ease, flex-basis 180ms ease, transform 180ms ease;
      }

      .sidebar.collapsed {
        flex-basis: 0;
        width: 0;
        overflow: hidden;
        border-right-color: transparent;
      }

      .project-header {
        display: flex;
        min-height: 76px;
        align-items: center;
        gap: 12px;
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--border-soft);
      }

      .project-icon {
        display: grid;
        width: 40px;
        height: 40px;
        flex: 0 0 40px;
        place-items: center;
        border: 1px solid #315c47;
        border-radius: 11px;
        background: linear-gradient(145deg, #183126, #11221b);
        color: var(--green);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 17px;
        font-weight: 800;
        box-shadow: inset 0 1px rgba(255, 255, 255, 0.04);
      }

      .project-copy {
        min-width: 0;
        flex: 1;
      }

      .project-name {
        overflow: hidden;
        font-size: 14px;
        font-weight: 720;
        letter-spacing: -0.01em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .project-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
      }

      .branch-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 8px rgba(85, 217, 138, 0.6);
      }

      .icon-button {
        display: grid;
        width: 34px;
        height: 34px;
        flex: 0 0 34px;
        cursor: pointer;
        place-items: center;
        border: 1px solid transparent;
        border-radius: 9px;
        background: transparent;
        color: var(--muted);
      }

      .icon-button:hover {
        border-color: var(--border);
        background: var(--panel-3);
        color: var(--text);
      }

      .search-wrap {
        padding: 11px 12px 6px;
      }

      .search {
        display: flex;
        height: 34px;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border: 1px solid var(--border-soft);
        border-radius: 9px;
        background: #0c1117;
        color: var(--faint);
      }

      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
        font-size: 12px;
      }

      .search input::placeholder {
        color: var(--faint);
      }

      .sidebar-scroll {
        min-height: 0;
        flex: 1;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 5px 8px 14px;
      }

      .section-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 8px 6px;
        color: var(--faint);
        font-size: 10px;
        font-weight: 750;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      .count {
        display: grid;
        min-width: 18px;
        height: 18px;
        place-items: center;
        border-radius: 7px;
        background: var(--panel-3);
        color: var(--muted);
        font-size: 10px;
      }

      .session-card {
        margin-bottom: 7px;
        overflow: hidden;
        border: 1px solid var(--border-soft);
        border-radius: 11px;
        background: rgba(20, 26, 35, 0.72);
      }

      .session-header {
        display: flex;
        height: 38px;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 680;
      }

      .chevron {
        color: var(--faint);
        font-size: 10px;
      }

      .session-title {
        min-width: 0;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .session-pill {
        padding: 2px 6px;
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--green);
        font-size: 9px;
        font-weight: 700;
      }

      .terminal-list {
        padding: 0 5px 5px;
      }

      .terminal-item {
        position: relative;
        display: grid;
        width: 100%;
        min-height: 52px;
        cursor: pointer;
        grid-template-columns: 22px minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        padding: 7px 8px;
        border: 1px solid transparent;
        border-radius: 9px;
        background: transparent;
        text-align: left;
      }

      .terminal-item:hover {
        background: rgba(255, 255, 255, 0.035);
      }

      .terminal-item.active {
        border-color: rgba(109, 168, 255, 0.22);
        background: var(--blue-soft);
      }

      .terminal-index {
        display: grid;
        width: 22px;
        height: 22px;
        place-items: center;
        border-radius: 7px;
        background: #0b1016;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
      }

      .active .terminal-index {
        background: rgba(109, 168, 255, 0.16);
        color: var(--blue);
      }

      .terminal-main {
        min-width: 0;
      }

      .terminal-name-row {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 7px;
      }

      .terminal-name {
        overflow: hidden;
        color: #dbe4ec;
        font-size: 12px;
        font-weight: 670;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .terminal-detail {
        overflow: hidden;
        margin-top: 3px;
        color: var(--faint);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 9px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        flex: 0 0 7px;
        border-radius: 50%;
        background: var(--faint);
      }

      .status-dot.running {
        background: var(--green);
        box-shadow: 0 0 7px rgba(85, 217, 138, 0.5);
      }

      .status-dot.activity {
        background: var(--blue);
        box-shadow: 0 0 8px rgba(109, 168, 255, 0.7);
      }

      .status-dot.success {
        background: var(--green);
      }

      .status-dot.error {
        background: var(--red);
      }

      .terminal-badge {
        padding: 3px 5px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--faint);
        font-size: 9px;
      }

      .terminal-badge.unread {
        background: rgba(109, 168, 255, 0.15);
        color: var(--blue);
      }

      .new-terminal {
        display: flex;
        width: 100%;
        height: 40px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 7px;
        border: 1px dashed #31513f;
        border-radius: 10px;
        background: rgba(85, 217, 138, 0.045);
        color: var(--green);
        font-size: 11px;
        font-weight: 700;
      }

      .new-terminal:hover {
        border-color: #3f7257;
        background: rgba(85, 217, 138, 0.09);
      }

      .secondary-session {
        display: flex;
        width: 100%;
        min-height: 42px;
        cursor: pointer;
        align-items: center;
        gap: 9px;
        padding: 0 10px;
        border: 0;
        border-radius: 9px;
        background: transparent;
        color: var(--muted);
        text-align: left;
      }

      .secondary-session:hover {
        background: rgba(255, 255, 255, 0.035);
      }

      .secondary-copy {
        min-width: 0;
        flex: 1;
      }

      .secondary-name {
        color: #bec9d3;
        font-size: 11px;
        font-weight: 650;
      }

      .secondary-meta {
        margin-top: 2px;
        color: var(--faint);
        font-size: 9px;
      }

      .sidebar-footer {
        display: flex;
        min-height: 48px;
        align-items: center;
        gap: 8px;
        padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--border-soft);
        color: var(--muted);
        font-size: 10px;
      }

      .connection-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 7px rgba(85, 217, 138, 0.45);
      }

      .footer-spacer {
        flex: 1;
      }

      .workspace {
        display: flex;
        min-width: 0;
        flex: 1;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        min-height: var(--topbar-height);
        align-items: center;
        gap: 9px;
        padding: 0 13px;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 14, 19, 0.9);
        backdrop-filter: blur(14px);
      }

      .menu-button {
        display: grid;
        width: 34px;
        height: 34px;
        cursor: pointer;
        place-items: center;
        border: 1px solid var(--border-soft);
        border-radius: 9px;
        background: var(--panel);
        color: var(--muted);
      }

      .terminal-heading {
        min-width: 0;
        flex: 1;
      }

      .terminal-title-row {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 7px;
      }

      .active-terminal-title {
        overflow: hidden;
        font-size: 13px;
        font-weight: 720;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .active-terminal-path {
        overflow: hidden;
        margin-top: 2px;
        color: var(--faint);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 9px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .action-button {
        display: flex;
        height: 32px;
        cursor: pointer;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        font-size: 10px;
        font-weight: 650;
      }

      .action-button:hover {
        border-color: var(--border);
        color: var(--text);
      }

      .terminal-shell {
        position: relative;
        min-height: 0;
        flex: 1;
        overflow: hidden;
        background: #080b0f;
      }

      .terminal-grid {
        position: absolute;
        inset: 0;
        opacity: 0.22;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      .terminal-content {
        position: absolute;
        inset: 0;
        overflow: auto;
        padding: 22px 22px 86px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        line-height: 1.58;
        scrollbar-color: #2a3541 transparent;
      }

      .line {
        min-height: 20px;
        white-space: pre-wrap;
      }

      .dim {
        color: #687687;
      }

      .green {
        color: var(--green);
      }

      .blue {
        color: var(--blue);
      }

      .amber {
        color: var(--amber);
      }

      .purple {
        color: var(--purple);
      }

      .terminal-statusbar {
        position: absolute;
        right: 12px;
        bottom: 12px;
        left: 12px;
        display: flex;
        min-height: 40px;
        align-items: center;
        gap: 9px;
        padding: 0 10px;
        border: 1px solid rgba(46, 59, 73, 0.82);
        border-radius: 11px;
        background: rgba(17, 22, 29, 0.92);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(12px);
      }

      .key {
        display: grid;
        min-width: 30px;
        height: 25px;
        cursor: pointer;
        place-items: center;
        padding: 0 7px;
        border: 1px solid var(--border);
        border-bottom-color: #344355;
        border-radius: 7px;
        background: #171e27;
        color: #aebbc8;
        font-size: 9px;
        font-weight: 700;
      }

      .key.accent {
        border-color: #315a47;
        color: var(--green);
      }

      .toolbar-spacer {
        flex: 1;
      }

      .tiny-status {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--faint);
        font-size: 9px;
      }

      .backdrop {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: none;
        background: rgba(0, 0, 0, 0.58);
        opacity: 0;
        backdrop-filter: blur(2px);
        transition: opacity 180ms ease;
      }

      .modal-backdrop {
        position: fixed;
        z-index: 60;
        inset: 0;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.66);
        backdrop-filter: blur(5px);
      }

      .modal-backdrop.open {
        display: grid;
      }

      .modal {
        width: min(430px, 100%);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 15px;
        background: #11171f;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 16px;
        border-bottom: 1px solid var(--border-soft);
      }

      .modal-title {
        font-size: 14px;
        font-weight: 750;
      }

      .modal-body {
        padding: 16px;
      }

      .field {
        margin-bottom: 14px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
      }

      .field input {
        width: 100%;
        height: 39px;
        padding: 0 11px;
        border: 1px solid var(--border);
        border-radius: 9px;
        outline: none;
        background: #0b1016;
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }

      .field input:focus {
        border-color: rgba(109, 168, 255, 0.62);
        box-shadow: 0 0 0 3px rgba(109, 168, 255, 0.08);
      }

      .modal-hint {
        margin-top: -5px;
        color: var(--faint);
        font-size: 9px;
        line-height: 1.5;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid var(--border-soft);
        background: rgba(8, 12, 16, 0.34);
      }

      .modal-button {
        height: 36px;
        cursor: pointer;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: var(--panel-2);
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .modal-button.primary {
        border-color: #347453;
        background: #23583e;
        color: #eafff2;
      }

      .prototype-note {
        position: fixed;
        z-index: 80;
        right: 14px;
        top: 66px;
        max-width: 270px;
        padding: 9px 11px;
        border: 1px solid rgba(109, 168, 255, 0.24);
        border-radius: 9px;
        background: rgba(17, 26, 38, 0.94);
        color: #b7c7d8;
        font-size: 10px;
        line-height: 1.5;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-5px);
        transition: 160ms ease;
      }

      .prototype-note.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 760px) {
        :root {
          --topbar-height: 52px;
        }

        .sidebar,
        .sidebar.collapsed {
          position: fixed;
          z-index: 30;
          top: 0;
          bottom: 0;
          left: 0;
          width: min(86vw, 320px);
          max-width: 320px;
          transform: translateX(-102%);
          border-right-color: var(--border);
          box-shadow: 20px 0 70px rgba(0, 0, 0, 0.42);
        }

        .sidebar.mobile-open {
          transform: translateX(0);
        }

        .backdrop.open {
          display: block;
          opacity: 1;
        }

        .project-header {
          padding-top: calc(14px + env(safe-area-inset-top));
        }

        .topbar {
          padding-top: env(safe-area-inset-top);
        }

        .action-label {
          display: none;
        }

        .action-button {
          width: 32px;
          padding: 0;
          justify-content: center;
        }

        .terminal-content {
          padding: 16px 13px 92px;
          font-size: 11px;
          line-height: 1.55;
        }

        .terminal-statusbar {
          right: 8px;
          bottom: calc(8px + env(safe-area-inset-bottom));
          left: 8px;
          min-height: 44px;
          gap: 6px;
          overflow-x: auto;
        }

        .tiny-status {
          display: none;
        }

        .key {
          flex: 0 0 auto;
        }

        .prototype-note {
          top: calc(62px + env(safe-area-inset-top));
          right: 8px;
          left: 8px;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar" aria-label="项目终端侧边栏">
        <header class="project-header">
          <div class="project-icon">&gt;_</div>
          <div class="project-copy">
            <div class="project-name">rust-terminal</div>
            <div class="project-meta"><span class="branch-dot"></span> main · clean</div>
          </div>
          <button class="icon-button" id="closeSidebar" title="收起侧边栏" aria-label="收起侧边栏">×</button>
        </header>

        <div class="search-wrap">
          <label class="search">
            <span>⌕</span>
            <input id="terminalSearch" type="search" placeholder="搜索终端或 session" />
          </label>
        </div>

        <div class="sidebar-scroll">
          <div class="section-label">
            <span>Project terminals</span>
            <span class="count" id="terminalCount">4</span>
          </div>

          <section class="session-card" data-session="rust-terminal">
            <div class="session-header">
              <span class="chevron">▼</span>
              <span>◫</span>
              <span class="session-title">rust-terminal</span>
              <span class="session-pill">current</span>
            </div>

            <div class="terminal-list" id="terminalList">
              <button
                class="terminal-item active"
                data-terminal="Codex"
                data-path="~/project/rust-terminal"
                data-kind="codex"
              >
                <span class="terminal-index">1</span>
                <span class="terminal-main">
                  <span class="terminal-name-row">
                    <span class="status-dot activity"></span>
                    <span class="terminal-name">Codex</span>
                  </span>
                  <span class="terminal-detail">codex · ~/project/rust-terminal</span>
                </span>
                <span class="terminal-badge unread">new</span>
              </button>

              <button
                class="terminal-item"
                data-terminal="Frontend"
                data-path="~/project/rust-terminal/frontend"
                data-kind="frontend"
              >
                <span class="terminal-index">2</span>
                <span class="terminal-main">
                  <span class="terminal-name-row">
                    <span class="status-dot running"></span>
                    <span class="terminal-name">Frontend</span>
                  </span>
                  <span class="terminal-detail">node · frontend/ · :5173</span>
                </span>
                <span class="terminal-badge">dev</span>
              </button>

              <button
                class="terminal-item"
                data-terminal="Server"
                data-path="~/project/rust-terminal/server"
                data-kind="server"
              >
                <span class="terminal-index">3</span>
                <span class="terminal-main">
                  <span class="terminal-name-row">
                    <span class="status-dot running"></span>
                    <span class="terminal-name">Server</span>
                  </span>
                  <span class="terminal-detail">rust-terminal · server/ · :7682</span>
                </span>
                <span class="terminal-badge">run</span>
              </button>

              <button
                class="terminal-item"
                data-terminal="Tests"
                data-path="~/project/rust-terminal"
                data-kind="tests"
              >
                <span class="terminal-index">4</span>
                <span class="terminal-main">
                  <span class="terminal-name-row">
                    <span class="status-dot success"></span>
                    <span class="terminal-name">Tests</span>
                  </span>
                  <span class="terminal-detail">cargo test · finished 2m ago</span>
                </span>
                <span class="terminal-badge">exit 0</span>
              </button>
            </div>
          </section>

          <button class="new-terminal" id="newTerminal">＋ New terminal</button>

          <div class="section-label">
            <span>Other sessions</span>
            <span class="count">2</span>
          </div>

          <button class="secondary-session" data-message="切换到 experiment session">
            <span class="chevron">▶</span>
            <span class="secondary-copy">
              <span class="secondary-name">experiment</span>
              <span class="secondary-meta">2 windows · idle 18m</span>
            </span>
            <span class="status-dot running"></span>
          </button>

          <button class="secondary-session" data-message="切换到 quick-shell session">
            <span class="chevron">▶</span>
            <span class="secondary-copy">
              <span class="secondary-name">quick-shell</span>
              <span class="secondary-meta">1 window · /tmp</span>
            </span>
            <span class="status-dot"></span>
          </button>
        </div>

        <footer class="sidebar-footer">
          <span class="connection-dot"></span>
          <span>Connected · tmux 3.5a</span>
          <span class="footer-spacer"></span>
          <span>4 windows</span>
        </footer>
      </aside>

      <div class="backdrop" id="backdrop"></div>

      <main class="workspace">
        <header class="topbar">
          <button class="menu-button" id="menuButton" title="终端侧边栏" aria-label="打开终端侧边栏">☰</button>
          <div class="terminal-heading">
            <div class="terminal-title-row">
              <span class="status-dot activity" id="headerStatus"></span>
              <span class="active-terminal-title" id="activeTitle">Codex</span>
            </div>
            <div class="active-terminal-path" id="activePath">~/project/rust-terminal · rust-terminal:1</div>
          </div>
          <div class="topbar-actions">
            <button class="action-button" data-message="打开 Git 变更面板"><span>⑂</span><span class="action-label">Git</span></button>
            <button class="action-button" data-message="向右创建 tmux pane"><span>◫</span><span class="action-label">Split</span></button>
            <button class="action-button" data-message="打开终端更多操作"><span>•••</span></button>
          </div>
        </header>

        <section class="terminal-shell" aria-label="终端预览">
          <div class="terminal-grid"></div>
          <div class="terminal-content" id="terminalContent"></div>

          <div class="terminal-statusbar">
            <button class="key">ESC</button>
            <button class="key">TAB</button>
            <button class="key">CTRL</button>
            <button class="key">↑</button>
            <button class="key">↓</button>
            <button class="key accent" id="toolbarNew">＋</button>
            <span class="toolbar-spacer"></span>
            <span class="tiny-status"><span class="connection-dot"></span> 118×34 · UTF-8</span>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-backdrop" id="newTerminalModal">
      <form class="modal" id="newTerminalForm">
        <div class="modal-header">
          <div class="modal-title">New terminal</div>
          <button class="icon-button" type="button" id="closeModal" aria-label="关闭">×</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="terminalName">名称</label>
            <input id="terminalName" value="Shell" autocomplete="off" />
          </div>
          <div class="field">
            <label for="terminalCwd">启动目录</label>
            <input id="terminalCwd" value="~/project/rust-terminal" autocomplete="off" />
          </div>
          <div class="field">
            <label for="terminalCommand">启动命令（可选）</label>
            <input id="terminalCommand" placeholder="例如 npm run dev" autocomplete="off" />
          </div>
          <div class="modal-hint">
            实际实现中，这里会调用 tmux new-window，并自动切换到新 window。其他终端继续在后台运行。
          </div>
        </div>
        <div class="modal-actions">
          <button class="modal-button" type="button" id="cancelModal">Cancel</button>
          <button class="modal-button primary" type="submit">Create terminal</button>
        </div>
      </form>
    </div>

    <div class="prototype-note" id="prototypeNote"></div>

    <script>
      const terminalSamples = {
        codex: [
          '<span class="dim">Last login: Fri Jul 11 14:08:21 on ttys004</span>',
          '<span class="green">➜</span>  <span class="blue">rust-terminal</span> <span class="purple">git:(main)</span> codex',
          '',
          '<span class="blue">╭────────────────────────────────────────────────────────────────────╮</span>',
          '<span class="blue">│</span>  <span class="green">Codex</span>  Working in ~/project/rust-terminal                         <span class="blue">│</span>',
          '<span class="blue">╰────────────────────────────────────────────────────────────────────╯</span>',
          '',
          '<span class="dim">•</span> Inspecting tmux session and window APIs',
          '<span class="dim">•</span> Reading frontend/src/components/SessionTabBar.tsx',
          '<span class="green">✓</span> Found existing session switching support',
          '<span class="amber">→</span> Designing window-level navigation and sidebar state…',
          '',
          '<span class="dim">You can keep working in Frontend or Server; this window continues in the background.</span>',
          '',
          '<span class="green">➜</span>  <span class="blue">rust-terminal</span> <span class="purple">git:(main)</span> <span class="amber">▌</span>'
        ],
        frontend: [
          '<span class="green">➜</span>  <span class="blue">frontend</span> <span class="purple">git:(main)</span> npm run dev',
          '',
          '&gt; rust-terminal@1.0.0 dev',
          '&gt; vite',
          '',
          '  <span class="purple">VITE v5.4.19</span>  ready in <span class="green">182 ms</span>',
          '',
          '  ➜  Local:   <span class="blue">http://localhost:5173/</span>',
          '  ➜  Network: <span class="blue">http://192.168.1.16:5173/</span>',
          '  ➜  press h + enter to show help',
          '',
          '<span class="dim">14:11:03 [vite] hmr update /src/components/TmuxSidebar.tsx</span>',
          '<span class="amber">▌</span>'
        ],
        server: [
          '<span class="green">➜</span>  <span class="blue">server</span> <span class="purple">git:(main)</span> cargo run',
          '   Compiling rust-terminal v0.1.0',
          '    Finished <span class="green">dev</span> profile [unoptimized + debuginfo] target(s) in 1.42s',
          '     Running `target/debug/rust-terminal`',
          '',
          '<span class="green">INFO</span> Listening on http://0.0.0.0:7682',
          '<span class="green">INFO</span> Terminal session: rust-terminal:1',
          '<span class="green">INFO</span> Terminal session: rust-terminal:2',
          '<span class="green">INFO</span> SSE client connected',
          '',
          '<span class="dim">Server keeps running while you switch windows.</span>',
          '<span class="amber">▌</span>'
        ],
        tests: [
          '<span class="green">➜</span>  <span class="blue">rust-terminal</span> <span class="purple">git:(main)</span> cargo test',
          '    Finished <span class="green">test</span> profile target(s) in 0.21s',
          '     Running unittests src/lib.rs',
          '',
          'running 47 tests',
          'test tests::test_parse_init_message ... <span class="green">ok</span>',
          'test tests::test_output_batching ... <span class="green">ok</span>',
          'test tests::test_tmux_window_listing ... <span class="green">ok</span>',
          'test tests::test_window_switch ... <span class="green">ok</span>',
          '',
          'test result: <span class="green">ok</span>. 47 passed; 0 failed; 0 ignored',
          '',
          '<span class="green">➜</span>  <span class="blue">rust-terminal</span> <span class="purple">git:(main)</span> <span class="amber">▌</span>'
        ],
        shell: [
          '<span class="dim">New tmux window created in rust-terminal session.</span>',
          '<span class="green">➜</span>  <span class="blue">rust-terminal</span> <span class="purple">git:(main)</span> <span class="amber">▌</span>'
        ]
      }

      const sidebar = document.getElementById('sidebar')
      const backdrop = document.getElementById('backdrop')
      const menuButton = document.getElementById('menuButton')
      const closeSidebar = document.getElementById('closeSidebar')
      const terminalContent = document.getElementById('terminalContent')
      const activeTitle = document.getElementById('activeTitle')
      const activePath = document.getElementById('activePath')
      const headerStatus = document.getElementById('headerStatus')
      const terminalList = document.getElementById('terminalList')
      const terminalCount = document.getElementById('terminalCount')
      const searchInput = document.getElementById('terminalSearch')
      const modal = document.getElementById('newTerminalModal')
      const note = document.getElementById('prototypeNote')
      let noteTimer

      function isMobile() {
        return window.matchMedia('(max-width: 760px)').matches
      }

      function openSidebar() {
        if (isMobile()) {
          sidebar.classList.add('mobile-open')
          backdrop.classList.add('open')
        } else {
          sidebar.classList.remove('collapsed')
        }
      }

      function hideSidebar() {
        if (isMobile()) {
          sidebar.classList.remove('mobile-open')
          backdrop.classList.remove('open')
        } else {
          sidebar.classList.add('collapsed')
        }
      }

      function showNote(message) {
        note.textContent = message
        note.classList.add('show')
        clearTimeout(noteTimer)
        noteTimer = setTimeout(() => note.classList.remove('show'), 2200)
      }

      function renderTerminal(kind) {
        const lines = terminalSamples[kind] || terminalSamples.shell
        terminalContent.innerHTML = lines.map((line) => `<div class="line">${line}</div>`).join('')
        terminalContent.scrollTop = terminalContent.scrollHeight
      }

      function activateTerminal(item) {
        document.querySelectorAll('.terminal-item').forEach((candidate) => candidate.classList.remove('active'))
        item.classList.add('active')
        const name = item.dataset.terminal
        const path = item.dataset.path
        const kind = item.dataset.kind
        const index = item.querySelector('.terminal-index').textContent
        activeTitle.textContent = name
        activePath.textContent = `${path} · rust-terminal:${index}`
        headerStatus.className = `status-dot ${kind === 'tests' ? 'success' : kind === 'codex' ? 'activity' : 'running'}`
        const unread = item.querySelector('.terminal-badge.unread')
        if (unread) {
          unread.classList.remove('unread')
          unread.textContent = 'live'
        }
        renderTerminal(kind)
        if (isMobile()) hideSidebar()
      }

      function openModal() {
        modal.classList.add('open')
        document.getElementById('terminalName').focus()
      }

      function closeModal() {
        modal.classList.remove('open')
      }

      menuButton.addEventListener('click', openSidebar)
      closeSidebar.addEventListener('click', hideSidebar)
      backdrop.addEventListener('click', hideSidebar)
      document.getElementById('newTerminal').addEventListener('click', openModal)
      document.getElementById('toolbarNew').addEventListener('click', openModal)
      document.getElementById('closeModal').addEventListener('click', closeModal)
      document.getElementById('cancelModal').addEventListener('click', closeModal)

      terminalList.addEventListener('click', (event) => {
        const item = event.target.closest('.terminal-item')
        if (item) activateTerminal(item)
      })

      searchInput.addEventListener('input', () => {
        const query = searchInput.value.trim().toLowerCase()
        document.querySelectorAll('.terminal-item, .secondary-session').forEach((item) => {
          item.style.display = item.textContent.toLowerCase().includes(query) ? '' : 'none'
        })
      })

      document.querySelectorAll('[data-message]').forEach((button) => {
        button.addEventListener('click', () => showNote(button.dataset.message))
      })

      document.getElementById('newTerminalForm').addEventListener('submit', (event) => {
        event.preventDefault()
        const nameInput = document.getElementById('terminalName')
        const cwdInput = document.getElementById('terminalCwd')
        const commandInput = document.getElementById('terminalCommand')
        const name = nameInput.value.trim() || `Shell ${terminalList.children.length + 1}`
        const cwd = cwdInput.value.trim() || '~/project/rust-terminal'
        const index = terminalList.children.length + 1
        const item = document.createElement('button')
        item.className = 'terminal-item'
        item.dataset.terminal = name
        item.dataset.path = cwd
        item.dataset.kind = 'shell'
        item.innerHTML = `
          <span class="terminal-index">${index}</span>
          <span class="terminal-main">
            <span class="terminal-name-row">
              <span class="status-dot running"></span>
              <span class="terminal-name"></span>
            </span>
            <span class="terminal-detail"></span>
          </span>
          <span class="terminal-badge">new</span>`
        item.querySelector('.terminal-name').textContent = name
        item.querySelector('.terminal-detail').textContent = `${commandInput.value.trim() || 'zsh'} · ${cwd}`
        terminalList.appendChild(item)
        terminalCount.textContent = terminalList.children.length
        closeModal()
        activateTerminal(item)
        showNote(`已模拟创建 tmux window：${name}`)
        nameInput.value = 'Shell'
        commandInput.value = ''
      })

      modal.addEventListener('click', (event) => {
        if (event.target === modal) closeModal()
      })

      window.addEventListener('resize', () => {
        if (!isMobile()) {
          sidebar.classList.remove('mobile-open')
          backdrop.classList.remove('open')
        }
      })

      renderTerminal('codex')
    </script>
  </body>
</html>

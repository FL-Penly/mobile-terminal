<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Board</title>
<style>
  :root {
    --bg: #1b1d22;
    --panel: #23262d;
    --panel-2: #2a2e36;
    --panel-3: #303540;
    --border: #353a44;
    --text: #e6e8eb;
    --muted: #8b929e;
    --accent: #4a9eff;
    --danger: #ff5c5c;
    --ok: #46c46e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, "PingFang SC", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  .status { font-size: 12px; color: var(--muted); min-width: 70px; text-align: right; }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--danger); }
  .hint { color: var(--muted); font-size: 12px; }
  button {
    font: inherit; color: var(--text); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  button.ghost:hover { color: var(--text); border-color: var(--border); }
  button.danger { color: var(--danger); }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 300px minmax(0, 1fr);
    min-height: 0;
  }
  .pane {
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .pane:last-child { border-right: 0; }
  .pane-head {
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,.12);
  }
  .pane-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 700;
  }
  .pane-head .spacer { flex: 1; }
  .icon-btn {
    width: 30px;
    height: 30px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .group-name {
    min-width: 0;
    flex: 1;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
    padding: 0 9px;
    font-weight: 700;
  }
  .group-name:focus {
    outline: none;
    border-color: var(--accent);
  }
  .scroll {
    overflow-y: auto;
    min-height: 0;
  }
  .item {
    min-height: 42px;
    padding: 9px 10px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .item:hover { background: var(--panel); }
  .item.active {
    background: var(--panel-2);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .item.drag-over { border-top: 2px solid var(--accent); }
  .item.dragging { opacity: .4; }
  .grip {
    color: var(--muted);
    cursor: grab;
    user-select: none;
    font-size: 13px;
  }
  .label {
    color: var(--text);
    font-weight: 650;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item.active .label { color: var(--accent); }
  .count {
    color: var(--muted);
    font-size: 12px;
    font-weight: 650;
  }
  .preview {
    color: var(--muted);
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .prompt-row {
    align-items: flex-start;
    flex-direction: column;
    gap: 2px;
    position: relative;
    padding-left: 30px;
  }
  .prompt-row .grip {
    position: absolute;
    top: 12px;
    left: 10px;
  }
  .add-row {
    color: var(--ok);
    padding: 12px 10px;
    cursor: pointer;
    font-weight: 650;
  }
  .add-row:hover { background: var(--panel); }

  .detail {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }
  .empty {
    margin: auto;
    color: var(--muted);
    text-align: center;
  }
  .title-input {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    width: 100%;
  }
  .prompt-text {
    flex: 1;
    min-height: 0;
    resize: none;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .title-input:focus,
  .prompt-text:focus {
    outline: none;
    border-color: var(--accent);
  }
  .variable-panel {
    display: none;
    border-bottom: 1px solid var(--border);
    padding: 10px;
    background: rgba(0,0,0,.08);
    max-height: 34vh;
    overflow-y: auto;
  }
  .variable-panel.open { display: block; }
  .variable-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .variable-title {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  .variable-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 8px;
  }
  .variable-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .variable-key {
    color: var(--muted);
    font: 11px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .variable-value {
    width: 100%;
    min-height: 42px;
    resize: vertical;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 8px;
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .variable-value:focus {
    outline: none;
    border-color: var(--accent);
  }
  .variable-note {
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .actions .spacer { flex: 1; }
  select {
    height: 34px;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 8px;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ok);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
    font-size: 13px;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 900px) {
    .main {
      grid-template-columns: 140px minmax(0, 1fr);
      grid-template-rows: 42vh minmax(0, 1fr);
    }
    .pane.detail-pane {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
    }
    .hint { display: none; }
  }
</style>
</head>
<body>
  <header>
    <h1>Prompt Board</h1>
    <span class="hint">与 rust-terminal 共享 ~/.vibeterm.json，支持 prompt 分组</span>
    <div class="spacer"></div>
    <span id="status" class="status">加载中...</span>
    <button class="ghost" id="reload">刷新</button>
  </header>

  <div class="main">
    <section class="pane">
      <div class="pane-head">
        <span class="pane-title">分组</span>
        <div class="spacer"></div>
        <button class="icon-btn" id="add-group" title="新建分组">+</button>
      </div>
      <div class="scroll" id="groups"></div>
    </section>

    <section class="pane">
      <div class="pane-head" id="prompts-head"></div>
      <div class="variable-panel" id="variable-panel"></div>
      <div class="scroll" id="prompts"></div>
    </section>

    <section class="pane detail-pane">
      <div class="detail" id="detail">
        <div class="empty">选择一个 prompt，或在当前分组中新建</div>
      </div>
    </section>
  </div>
  <div class="toast" id="toast"></div>

<script>
const API = '/api/user-config';
const DEFAULT_GROUP_ID = 'default';
const VARIABLE_START = '【变量区】';
const VARIABLE_END = '【执行区】';
const VARIABLE_LINE_RE = /^(\s*)([A-Z][A-Z0-9_]*)\s*=\s*(.*)$/;
let config = { commands: [], presets: [], presetGroups: [], activePresetGroupId: DEFAULT_GROUP_ID };
let selectedGroupId = DEFAULT_GROUP_ID;
let selectedPrompt = -1;
let groupDragFrom = -1;
let promptDragFrom = -1;
let variablePanelOpen = false;

const $ = (id) => document.getElementById(id);
const statusEl = $('status');

function isRecord(value) {
  return value && typeof value === 'object' && !Array.isArray(value);
}

function toPreset(value) {
  if (!isRecord(value)) return null;
  const label = typeof value.label === 'string' ? value.label : '';
  const text = typeof value.text === 'string' ? value.text : '';
  return label || text ? { label, text } : null;
}

function toPresets(value) {
  if (!Array.isArray(value)) return [];
  return value.map(toPreset).filter(Boolean);
}

function getVariableSection(text) {
  const startMarker = text.indexOf(VARIABLE_START);
  if (startMarker === -1) return null;
  const start = startMarker + VARIABLE_START.length;
  const endMarker = text.indexOf(VARIABLE_END, start);
  return { start, end: endMarker === -1 ? text.length : endMarker };
}

function extractPromptVariables(text) {
  const section = getVariableSection(text || '');
  if (!section) return [];
  return text.slice(section.start, section.end)
    .split(/\r?\n/)
    .map(line => {
      const match = line.match(VARIABLE_LINE_RE);
      return match ? { key: match[2], value: match[3].trim() } : null;
    })
    .filter(Boolean);
}

function getGroupVariableKeys(group) {
  const keys = [];
  const seen = new Set();
  if (!group) return keys;
  group.presets.forEach(preset => {
    extractPromptVariables(preset.text).forEach(variable => {
      if (seen.has(variable.key)) return;
      seen.add(variable.key);
      keys.push(variable.key);
    });
  });
  return keys;
}

function getGroupVariableValues(group) {
  const values = {};
  if (!group) return values;
  group.presets.forEach(preset => {
    extractPromptVariables(preset.text).forEach(variable => {
      if (!(variable.key in values)) values[variable.key] = variable.value;
    });
  });
  return values;
}

function sanitizeVariableValue(value) {
  return String(value || '').replace(/\s*\r?\n\s*/g, ' ').trim();
}

function applyVariablesToPrompt(text, values) {
  const section = getVariableSection(text || '');
  if (!section) return text || '';
  const before = text.slice(0, section.start);
  const variableBlock = text.slice(section.start, section.end);
  const after = text.slice(section.end);
  const nextBlock = variableBlock
    .split(/(\r?\n)/)
    .map(part => {
      if (part === '\n' || part === '\r\n') return part;
      const match = part.match(VARIABLE_LINE_RE);
      if (!match || !(match[2] in values)) return part;
      return `${match[1]}${match[2]} = ${sanitizeVariableValue(values[match[2]])}`;
    })
    .join('');
  return before + nextBlock + after;
}

function toGroup(value, idx) {
  if (!isRecord(value)) return null;
  const rawId = typeof value.id === 'string' ? value.id.trim() : '';
  const id = rawId || `group-${idx + 1}`;
  const rawLabel = typeof value.label === 'string' ? value.label.trim() : '';
  return {
    id,
    label: rawLabel || id,
    presets: toPresets(value.presets),
  };
}

function normalize(raw) {
  const data = isRecord(raw) ? raw : {};
  const commands = Array.isArray(data.commands) ? data.commands : [];
  const legacyPresets = toPresets(data.presets);
  const groups = Array.isArray(data.presetGroups)
    ? data.presetGroups.map(toGroup).filter(Boolean)
    : [];
  const presetGroups = groups.length > 0
    ? groups
    : [{ id: DEFAULT_GROUP_ID, label: '默认', presets: legacyPresets }];
  const requestedActive = typeof data.activePresetGroupId === 'string'
    ? data.activePresetGroupId
    : presetGroups[0].id;
  const activePresetGroupId = presetGroups.some(g => g.id === requestedActive)
    ? requestedActive
    : presetGroups[0].id;
  const activeGroup = presetGroups.find(g => g.id === activePresetGroupId) || presetGroups[0];
  return {
    commands,
    presets: activeGroup.presets,
    presetGroups,
    activePresetGroupId,
  };
}

function syncLegacyPresets() {
  const group = currentGroup();
  config.activePresetGroupId = selectedGroupId;
  config.presets = group ? group.presets : [];
}

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status' + (cls ? ' ' + cls : '');
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1200);
}

function currentGroup() {
  return config.presetGroups.find(g => g.id === selectedGroupId) || config.presetGroups[0] || null;
}

function currentGroupIndex() {
  return config.presetGroups.findIndex(g => g.id === selectedGroupId);
}

function currentPrompt() {
  const group = currentGroup();
  if (!group) return null;
  return group.presets[selectedPrompt] || null;
}

function ensureSelection() {
  if (config.presetGroups.length === 0) {
    config.presetGroups.push({ id: DEFAULT_GROUP_ID, label: '默认', presets: [] });
  }
  if (!config.presetGroups.some(g => g.id === selectedGroupId)) {
    selectedGroupId = config.activePresetGroupId || config.presetGroups[0].id;
  }
  if (!config.presetGroups.some(g => g.id === selectedGroupId)) {
    selectedGroupId = config.presetGroups[0].id;
  }
  const group = currentGroup();
  if (!group || group.presets.length === 0) {
    selectedPrompt = -1;
  } else if (selectedPrompt < 0 || selectedPrompt >= group.presets.length) {
    selectedPrompt = 0;
  }
}

async function load() {
  setStatus('加载中...');
  try {
    const res = await fetch(API, { cache: 'no-store' });
    const data = await res.json();
    config = normalize(data);
    selectedGroupId = config.activePresetGroupId;
    selectedPrompt = currentGroup()?.presets.length ? 0 : -1;
    ensureSelection();
    setStatus('已同步', 'ok');
    render();
  } catch (e) {
    setStatus('读取失败', 'err');
  }
}

async function save() {
  setStatus('保存中...');
  syncLegacyPresets();
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    if (!res.ok) throw new Error('bad status');
    setStatus('已同步', 'ok');
  } catch (e) {
    setStatus('保存失败', 'err');
  }
}

function render() {
  ensureSelection();
  renderGroups();
  renderPromptPane();
  renderDetail();
}

function renderGroups() {
  const el = $('groups');
  el.innerHTML = '';
  config.presetGroups.forEach((group, idx) => {
    const row = document.createElement('div');
    row.className = 'item' + (group.id === selectedGroupId ? ' active' : '');
    row.draggable = true;

    const grip = document.createElement('span');
    grip.className = 'grip';
    grip.textContent = '::';
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = group.label || '(未命名)';
    const count = document.createElement('span');
    count.className = 'count';
    count.textContent = String(group.presets.length);
    row.append(grip, label, count);

    row.addEventListener('click', () => {
      selectedGroupId = group.id;
      config.activePresetGroupId = group.id;
      selectedPrompt = group.presets.length ? 0 : -1;
      variablePanelOpen = false;
      render();
      save();
    });
    row.addEventListener('dragstart', (e) => {
      groupDragFrom = idx;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      groupDragFrom = -1;
      document.querySelectorAll('.item').forEach(item => item.classList.remove('drag-over', 'dragging'));
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (groupDragFrom === -1 || groupDragFrom === idx) return;
      const moved = config.presetGroups.splice(groupDragFrom, 1)[0];
      config.presetGroups.splice(idx, 0, moved);
      selectedGroupId = moved.id;
      render();
      save();
    });

    el.appendChild(row);
  });
}

function renderPromptPane() {
  const group = currentGroup();
  const head = $('prompts-head');
  const list = $('prompts');
  head.innerHTML = '';
  list.innerHTML = '';

  if (!group) {
    head.innerHTML = '<span class="pane-title">Prompt</span>';
    list.innerHTML = '<div class="empty">暂无分组</div>';
    $('variable-panel').innerHTML = '';
    $('variable-panel').className = 'variable-panel';
    return;
  }

  const nameInput = document.createElement('input');
  nameInput.className = 'group-name';
  nameInput.value = group.label;
  nameInput.placeholder = '分组名称';
  nameInput.addEventListener('input', () => {
    group.label = nameInput.value;
    renderGroups();
  });
  nameInput.addEventListener('change', save);

  const addBtn = document.createElement('button');
  addBtn.className = 'icon-btn';
  addBtn.title = '新建 prompt';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', addPreset);

  const variableBtn = document.createElement('button');
  variableBtn.className = 'icon-btn';
  variableBtn.title = '编辑当前分组变量';
  variableBtn.textContent = 'V';
  variableBtn.disabled = getGroupVariableKeys(group).length === 0;
  variableBtn.addEventListener('click', () => {
    variablePanelOpen = !variablePanelOpen;
    renderPromptPane();
  });

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'icon-btn danger';
  deleteBtn.title = '删除分组';
  deleteBtn.textContent = '×';
  deleteBtn.addEventListener('click', removeGroup);

  head.append(nameInput, variableBtn, addBtn, deleteBtn);
  renderVariablePanel();

  group.presets.forEach((preset, idx) => {
    const row = document.createElement('div');
    row.className = 'item prompt-row' + (idx === selectedPrompt ? ' active' : '');
    row.draggable = true;

    const grip = document.createElement('span');
    grip.className = 'grip';
    grip.textContent = '::';
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = preset.label || '(未命名)';
    const preview = document.createElement('div');
    preview.className = 'preview';
    preview.textContent = (preset.text || '').replace(/\s+/g, ' ').trim() || '空内容';
    row.append(grip, label, preview);

    row.addEventListener('click', () => {
      selectedPrompt = idx;
      render();
    });
    row.addEventListener('dragstart', (e) => {
      promptDragFrom = idx;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      promptDragFrom = -1;
      document.querySelectorAll('.item').forEach(item => item.classList.remove('drag-over', 'dragging'));
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (promptDragFrom === -1 || promptDragFrom === idx) return;
      const moved = group.presets.splice(promptDragFrom, 1)[0];
      group.presets.splice(idx, 0, moved);
      selectedPrompt = idx;
      render();
      save();
    });

    list.appendChild(row);
  });

  const add = document.createElement('div');
  add.className = 'add-row';
  add.textContent = '+ 新建 prompt';
  add.addEventListener('click', addPreset);
  list.appendChild(add);
}

function renderVariablePanel() {
  const panel = $('variable-panel');
  const group = currentGroup();
  const keys = getGroupVariableKeys(group);
  panel.innerHTML = '';
  panel.className = 'variable-panel' + (variablePanelOpen ? ' open' : '');
  if (!variablePanelOpen) return;

  if (!group || keys.length === 0) {
    panel.innerHTML = '<div class="empty">当前分组没有变量区</div>';
    return;
  }

  const values = getGroupVariableValues(group);
  const head = document.createElement('div');
  head.className = 'variable-head';
  const title = document.createElement('div');
  title.className = 'variable-title';
  title.textContent = '当前分组变量';
  const spacer = document.createElement('div');
  spacer.className = 'spacer';
  const applyBtn = document.createElement('button');
  applyBtn.className = 'primary';
  applyBtn.textContent = '应用到当前分组';
  applyBtn.addEventListener('click', applyGroupVariables);
  head.append(title, spacer, applyBtn);

  const grid = document.createElement('div');
  grid.className = 'variable-grid';
  keys.forEach(key => {
    const field = document.createElement('label');
    field.className = 'variable-field';
    const name = document.createElement('span');
    name.className = 'variable-key';
    name.textContent = key;
    const input = document.createElement('textarea');
    input.className = 'variable-value';
    input.rows = 2;
    input.dataset.key = key;
    input.value = values[key] || '';
    field.append(name, input);
    grid.appendChild(field);
  });

  const note = document.createElement('div');
  note.className = 'variable-note';
  note.textContent = '只替换当前分组所有 prompt 的【变量区】同名变量，不修改执行区。';
  panel.append(head, grid, note);
}

function applyGroupVariables() {
  const group = currentGroup();
  if (!group) return;
  const values = {};
  document.querySelectorAll('#variable-panel .variable-value').forEach(input => {
    const key = input.dataset.key;
    if (key) values[key] = input.value;
  });
  group.presets = group.presets.map(preset => ({
    label: preset.label || '',
    text: applyVariablesToPrompt(preset.text || '', values),
  }));
  render();
  save();
  toast(`已应用到 ${group.presets.length} 个 prompt`);
}

function renderDetail() {
  const d = $('detail');
  const group = currentGroup();
  const preset = currentPrompt();
  d.innerHTML = '';

  if (!group) {
    d.innerHTML = '<div class="empty">先创建一个分组</div>';
    return;
  }
  if (!preset) {
    d.innerHTML = '<div class="empty">当前分组还没有 prompt</div>';
    return;
  }

  const title = document.createElement('input');
  title.className = 'title-input';
  title.value = preset.label || '';
  title.placeholder = '标签名';
  title.addEventListener('input', () => {
    preset.label = title.value;
    renderPromptPane();
  });
  title.addEventListener('change', save);

  const ta = document.createElement('textarea');
  ta.className = 'prompt-text';
  ta.value = preset.text || '';
  ta.placeholder = 'prompt 内容...';
  ta.addEventListener('input', () => {
    preset.text = ta.value;
  });
  ta.addEventListener('change', () => {
    renderPromptPane();
    save();
  });

  const actions = document.createElement('div');
  actions.className = 'actions';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'primary';
  copyBtn.textContent = '复制内容';
  copyBtn.addEventListener('click', () => copy(preset.text));

  const moveSelect = document.createElement('select');
  config.presetGroups.forEach(target => {
    if (target.id === group.id) return;
    const opt = document.createElement('option');
    opt.value = target.id;
    opt.textContent = `移动到：${target.label}`;
    moveSelect.appendChild(opt);
  });
  const moveBtn = document.createElement('button');
  moveBtn.textContent = '移动';
  moveBtn.disabled = moveSelect.options.length === 0;
  moveBtn.addEventListener('click', () => movePreset(moveSelect.value));

  const copyToSelect = document.createElement('select');
  config.presetGroups.forEach(target => {
    if (target.id === group.id) return;
    const opt = document.createElement('option');
    opt.value = target.id;
    opt.textContent = `复制到：${target.label}`;
    copyToSelect.appendChild(opt);
  });
  const copyToBtn = document.createElement('button');
  copyToBtn.textContent = '复制';
  copyToBtn.disabled = copyToSelect.options.length === 0;
  copyToBtn.addEventListener('click', () => copyPresetToGroup(copyToSelect.value));

  const spacer = document.createElement('div');
  spacer.className = 'spacer';

  const delBtn = document.createElement('button');
  delBtn.className = 'danger';
  delBtn.textContent = '删除';
  delBtn.addEventListener('click', () => removePreset(selectedPrompt));

  actions.append(copyBtn);
  if (moveSelect.options.length > 0) actions.append(moveSelect, moveBtn);
  if (copyToSelect.options.length > 0) actions.append(copyToSelect, copyToBtn);
  actions.append(spacer, delBtn);
  d.append(title, ta, actions);
}

function makeGroupId(label) {
  const base = (label || 'group').trim().toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-|-$/g, '') || 'group';
  let id = base;
  let count = 2;
  while (config.presetGroups.some(g => g.id === id)) {
    id = `${base}-${count}`;
    count += 1;
  }
  return id;
}

function addGroup() {
  const label = window.prompt('新分组名称', '新分组');
  if (!label || !label.trim()) return;
  const group = { id: makeGroupId(label), label: label.trim(), presets: [] };
  config.presetGroups.push(group);
  selectedGroupId = group.id;
  selectedPrompt = -1;
  render();
  save();
}

function removeGroup() {
  const idx = currentGroupIndex();
  const group = currentGroup();
  if (idx < 0 || !group) return;
  if (config.presetGroups.length === 1) {
    toast('至少保留一个分组');
    return;
  }
  if (!confirm(`删除分组「${group.label || '未命名'}」及其 ${group.presets.length} 个 prompt？`)) return;
  config.presetGroups.splice(idx, 1);
  selectedGroupId = config.presetGroups[Math.max(0, idx - 1)].id;
  selectedPrompt = config.presetGroups[Math.max(0, idx - 1)].presets.length ? 0 : -1;
  render();
  save();
}

function addPreset() {
  const group = currentGroup();
  if (!group) return;
  group.presets.push({ label: '新标签', text: '' });
  selectedPrompt = group.presets.length - 1;
  render();
  save();
  const t = document.querySelector('.detail input.title-input');
  if (t) { t.focus(); t.select(); }
}

function removePreset(i) {
  const group = currentGroup();
  if (!group || i < 0 || i >= group.presets.length) return;
  if (!confirm(`删除「${group.presets[i].label || '未命名'}」？`)) return;
  group.presets.splice(i, 1);
  if (selectedPrompt >= group.presets.length) selectedPrompt = group.presets.length - 1;
  render();
  save();
}

function movePreset(targetGroupId) {
  const source = currentGroup();
  const target = config.presetGroups.find(g => g.id === targetGroupId);
  if (!source || !target || selectedPrompt < 0) return;
  const moved = source.presets.splice(selectedPrompt, 1)[0];
  target.presets.push(moved);
  selectedGroupId = target.id;
  selectedPrompt = target.presets.length - 1;
  render();
  save();
}

function copyPresetToGroup(targetGroupId) {
  const source = currentGroup();
  const target = config.presetGroups.find(g => g.id === targetGroupId);
  if (!source || !target || selectedPrompt < 0) return;
  const preset = source.presets[selectedPrompt];
  if (!preset) return;
  target.presets.push({ label: preset.label || '', text: preset.text || '' });
  selectedGroupId = target.id;
  selectedPrompt = target.presets.length - 1;
  render();
  save();
  toast(`已复制到 ${target.label || '目标分组'}`);
}

async function copy(text) {
  try {
    await navigator.clipboard.writeText(text || '');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text || '';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  toast('已复制');
}

$('reload').addEventListener('click', load);
$('add-group').addEventListener('click', addGroup);
load();
</script>
</body>
</html>
